<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="ManimIcon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study App</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #000800;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      gap: 20px;
    }
    .top-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 480px;
    }
    .back-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 22px;
      cursor: pointer;
      padding: 4px 8px 4px 0;
      line-height: 1;
    }
    .back-btn:hover { color: #e8e8e8; }
    .nav-title { font-size: 16px; font-weight: 500; }
    .tabs {
      display: flex;
      gap: 4px;
      background: #1a1a1a;
      border-radius: 12px;
      padding: 4px;
      width: 100%;
      max-width: 480px;
    }
    .tab {
      flex: 1;
      padding: 10px 0;
      border-radius: 9px;
      border: none;
      background: transparent;
      color: #666;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .tab.active { background: #2a2a2a; color: #e8e8e8; }
    .section {
      display: none;
      width: 100%;
      max-width: 480px;
      flex-direction: column;
      align-items: stretch;
      gap: 20px;
    }
    .section.active { display: flex; }
    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .streak-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 14px;
      font-weight: 500;
    }
    .known-badge { font-size: 13px; color: #555; }
    .bar-wrap { width: 100%; height: 3px; background: #2a2a2a; border-radius: 2px; overflow: hidden; }
    .bar-fill  { height: 100%; width: 0%; background: #7c6ff7; border-radius: 2px; transition: width .4s; }
    .scene {
      width: 100%;
      height: 260px;
      perspective: 1000px;
      cursor: default;
    }
    .card-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s ease;
    }
    .scene.flipped .card-inner { transform: rotateY(180deg); }
    .card-face {
      position: absolute; inset: 0;
      background: #050241;
      border-radius: 18px;
      border: 1px solid #919191;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .card-face.back {
      transform: rotateY(180deg);
      background: #050241;
      border-color: #919191;
    }
    .card-text {
      font-size: 18px;
      line-height: 1.7;
      text-align: center;
      color: #e8e8e8;
    }
    .katex { color: #e8e8e8 !important; }
    .katex-display { color: #e8e8e8 !important; }
    .hidden { display: none !important; }
    .done-screen {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 40px 0;
    }
    .done-emoji { font-size: 56px; }
    .done-title { font-size: 22px; font-weight: 500; }
    .done-sub   { font-size: 14px; color: #555; line-height: 1.6; }
    .done-stats { display: flex; gap: 24px; }
    .stat { text-align: center; }
    .stat-num { font-size: 28px; font-weight: 500; }
    .stat-num.green { color: #5dc4a0; }
    .stat-num.red   { color: #e07070; }
    .stat-label { font-size: 12px; color: #555; margin-top: 2px; }
    .restart-btn {
      padding: 12px 32px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #e8e8e8;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .restart-btn:hover { background: #222; }
    .progress-header {
      font-size: 13px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .progress-item {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .progress-item-text { font-size: 14px; color: #aaa; flex: 1; }
    .theory-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color .2s;
    }
    .theory-card:hover { border-color: #3a3560; }
    .theory-card.open  { border-color: #3a3560; }
    .theory-header {
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .theory-title { font-size: 15px; font-weight: 500; }
    .theory-arrow { font-size: 18px; color: #555; transition: transform .3s; }
    .theory-card.open .theory-arrow { transform: rotate(90deg); }
    .theory-body { display: none; padding: 0 16px 16px; }
    .theory-card.open .theory-body { display: block; }
    .theory-empty { font-size: 14px; color: #444; text-align: center; padding: 32px 0; }
    video { width: 100%; border-radius: 10px; background: #000; }
    .pdf-wrap { display: flex; flex-direction: column; gap: 10px; }
    .pdf-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1a1a;
      border: 1px solid #3a3560;
      border-radius: 10px;
      padding: 12px 16px;
      color: #9b93f0;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: background .15s;
    }
    .pdf-btn:hover { background: #222; }
    .pdf-frame {
      width: 100%;
      height: 500px;
      border: none;
      border-radius: 10px;
      background: #fff;
    }
    #answer-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #e8e8e8;
      font-size: 15px;
      font-family: 'Courier New', monospace;
      outline: none;
      transition: border-color .2s;
    }
    #answer-input:focus { border-color: #7c6ff7; }
    #answer-input.correct { border-color: #5dc4a0; background: #101e1a; }
    #next-btn {
      display: none;
      width: 100%;
      margin-top: 12px;
      padding: 13px 0;
      border-radius: 12px;
      border: 1px solid #7c6ff7;
      background: #1a1830;
      color: #9b93f0;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
    }
    #next-btn:hover { background: #222040; }
    #answer-input.wrong   { border-color: #e07070; background: #1e1414; }
    #answer-feedback {
      font-size: 13px;
      margin-top: 8px;
      padding: 10px 14px;
      border-radius: 10px;
      text-align: center;
    }
    #answer-feedback.correct { color: #5dc4a0; background: #101e1a; border: 1px solid #1a3a30; }
    #answer-feedback.wrong   { color: #e07070; background: #1e1414; border: 1px solid #3a1f1f; }
    #formula-preview { color: #e8e8e8; padding: 8px; min-height: 40px; text-align: center; }
    .submit-btn {
      width: 100%;
      margin-top: 12px;
      padding: 13px 0;
      border-radius: 12px;
      border: 1px solid #7c6ff7;
      background: #1a1830;
      color: #9b93f0;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
    }
    .submit-btn:hover { background: #222040; }
  </style>
</head>

<script type="importmap">
{
  "imports": {
    "ts-fsrs": "https://cdn.jsdelivr.net/npm/ts-fsrs@4.4.2/dist/index.mjs"
  }
}
</script>

<body>

  <div class="top-nav">
    <button class="back-btn" onclick="window.location.href='index.html'">‹</button>
    <div class="nav-title" id="nav-title"></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('cards', this)">Карточки</button>
    <button class="tab"        onclick="switchTab('theory', this)">Теория</button>
    <button class="tab"        onclick="switchTab('progress', this)">Прогресс</button>
  </div>

  <div class="section active" id="section-cards">
    <div class="top-row">
      <div class="streak-badge">🔥 <span id="streak-val">0</span> дней</div>
      <div class="known-badge"><span id="known-count">0</span> / <span id="total-count">0</span></div>
    </div>
    <div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>

    <div id="card-area">
      <div class="scene" id="scene">
        <div class="card-inner" id="card-inner">
          <div class="card-face front">
            <img id="q-img" src="" alt="" style="display:none; max-width:100%; max-height:120px; border-radius:10px; margin-bottom:12px;">
            <div class="card-text" id="q-text"></div>
          </div>
          <div class="card-face back">
            <div class="card-text" id="a-text"></div>
          </div>
        </div>
      </div>

      <div id="input-area" style="margin-top:20px; display:none;">
        <div id="formula-preview" style="display:none; margin-bottom:10px;"></div>
        <input
          id="answer-input"
          type="text"
          placeholder="Введите ответ..."
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        >
        <div id="answer-feedback" style="display:none;"></div>
        <button class="submit-btn" id="submit-btn" onclick="checkAnswer()">Проверить</button>
      </div>
      <button id="next-btn">Следующая →</button>
    </div>

    <div class="done-screen hidden" id="done-screen">
      <div class="done-emoji">🎉</div>
      <div class="done-title">Сессия завершена!</div>
      <div class="done-stats">
        <div class="stat">
          <div class="stat-num green" id="done-known">0</div>
          <div class="stat-label">правильно</div>
        </div>
        <div class="stat">
          <div class="stat-num red" id="done-unknown">0</div>
          <div class="stat-label">неправильно</div>
        </div>
      </div>
      <div class="done-sub" id="done-sub"></div>
      <button class="restart-btn" onclick="restart()">Повторить снова</button>
    </div>
  </div>

  <div class="section" id="section-theory">
    <div id="theory-list"></div>
  </div>

  <div class="section" id="section-progress">
    <div class="progress-header">Все карточки</div>
    <div id="progress-list"></div>
  </div>

  <script type="module">
    import { fsrs, createEmptyCard, Rating } from 'ts-fsrs';
    const f = fsrs();

    const params = new URLSearchParams(window.location.search);
    const subjectId = params.get('subject') || 'matan';

    const script = document.createElement('script');
    script.src = `data/${subjectId}.js`;
    script.onload = () => init(SUBJECT);
    script.onerror = () => {
      document.body.innerHTML = '<p style="color:#555;padding:40px">Предмет не найден</p>';
    };
    document.head.appendChild(script);

    const OPTS = {
      delimiters: [
        { left: "$$", right: "$$", display: true  },
        { left: "$",  right: "$",  display: false },
      ],
      throwOnError: false
    };

    function init(s) {
      document.title = s.title;
      document.getElementById('nav-title').textContent = s.emoji + ' ' + s.title;

      // Стрик
      let streak = parseInt(localStorage.getItem('streak') || '0');
      const today = new Date().toDateString();
      const lastDay = localStorage.getItem('lastDay');
      const yesterday = new Date(Date.now() - 86400000).toDateString();
      if (lastDay === today) {
        // не меняем
      } else if (lastDay === yesterday) {
        streak++;
        localStorage.setItem('streak', streak);
        localStorage.setItem('lastDay', today);
      } else {
        streak = 1;
        localStorage.setItem('streak', streak);
        localStorage.setItem('lastDay', today);
      }

      // FSRS
      let cardStates = JSON.parse(localStorage.getItem('fsrs_' + s.id) || '{}');
      s.cards.forEach((_, i) => {
        if (!cardStates[String(i)]) {
          cardStates[String(i)] = {
            card: createEmptyCard(),
            due: new Date().toISOString()
          };
        }
      });

      function saveStates() {
        localStorage.setItem('fsrs_' + s.id, JSON.stringify(cardStates));
      }

      function getTodayQueue() {
        const now = new Date();
        const due = [], notDue = [];
        s.cards.forEach((_, i) => {
          if (new Date(cardStates[String(i)].due) <= now) due.push(i);
          else notDue.push(i);
        });
        return [...due, ...notDue];
      }

      let queue = [], qIdx = 0;
      let sessionKnown = 0, sessionUnknown = 0;
      let flipped = false;
      let isAnimating = false;
      let pendingRate = null; // оценка ожидающая завершения анимации

      function buildQueue() {
        queue = getTodayQueue();
        qIdx = 0;
        sessionKnown = 0;
        sessionUnknown = 0;
      }

      // ======= НОРМАЛИЗАЦИЯ =======
      function normalizeText(str)   { return str.trim().toLowerCase(); }
      function normalizeLatex(str)  { return str.replace(/\s+/g, '').toLowerCase(); }
      function normalizeSimple(str) { return str.replace(/\s+/g, '').toLowerCase(); }

      // ======= РЕНДЕР =======
      function renderCard() {
        if (flipped) {
          isAnimating = true;
          document.getElementById('scene').classList.remove('flipped');
          setTimeout(() => {
            isAnimating = false;
            flipped = false;
            updateCardContent();
          }, 520);
        } else {
          updateCardContent();
        }
      }

      function updateCardContent() {
        const now = new Date();
        const dueCount = s.cards.filter((_, i) =>
          new Date(cardStates[String(i)].due) <= now
        ).length;

        const c = s.cards[queue[qIdx]];

        // Картинка
        const qImg = document.getElementById('q-img');
        if (c.img) {
          qImg.src = c.img;
          qImg.style.display = 'block';
        } else {
          qImg.style.display = 'none';
          qImg.src = '';
        }

        // Вопрос
        const elQ = document.getElementById('q-text');
        elQ.innerHTML = c.q;
        renderMathInElement(elQ, OPTS);

        // Ответ на обратной стороне
        const elA = document.getElementById('a-text');
        if (c.type === 'formula') {
          elA.innerHTML = '$$' + c.a + '$$';
        } else if (c.type === 'simple') {
          elA.innerHTML = '$' + c.a + '$';
        } else {
          elA.innerHTML = c.a;
        }
        renderMathInElement(elA, OPTS);

        // Сброс поля ввода
        const inputArea   = document.getElementById('input-area');
        const answerInput = document.getElementById('answer-input');
        const feedback    = document.getElementById('answer-feedback');
        const preview     = document.getElementById('formula-preview');

        answerInput.value = '';
        answerInput.classList.remove('correct', 'wrong');
        answerInput.disabled = false;
        feedback.style.display = 'none';
        feedback.className = '';
        feedback.textContent = '';
        preview.style.display = 'none';
        preview.innerHTML = '';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'block';

        inputArea.style.display = 'block';
        document.getElementById('card-area').style.display = 'block';
        document.getElementById('done-screen').classList.add('hidden');

        // Плейсхолдер и live-preview по типу
        if (c.type === 'formula') {
          preview.style.display = 'block';
          answerInput.placeholder = 'Введите LaTeX, например: \\frac{a}{b}';
          answerInput.oninput = () => {
            try {
              katex.render(answerInput.value, preview, { throwOnError: false, displayMode: true });
            } catch(e) {
              preview.textContent = answerInput.value;
            }
          };
        } else if (c.type === 'simple') {
          preview.style.display = 'block';
          answerInput.placeholder = 'Например: I=U/R';
          answerInput.oninput = () => {
            try {
              katex.render(answerInput.value, preview, { throwOnError: false, displayMode: true });
            } catch(e) {
              preview.textContent = answerInput.value;
            }
          };
        } else {
          answerInput.placeholder = 'Введите ответ...';
          answerInput.oninput = null;
          preview.style.display = 'none';
        }

        document.getElementById('bar').style.width = (qIdx / queue.length * 100) + '%';
        document.getElementById('streak-val').textContent = streak;
        document.getElementById('known-count').textContent = sessionKnown;
        document.getElementById('total-count').textContent = dueCount + ' на сегодня';

        flipped = false;
        setTimeout(() => answerInput.focus(), 100);
      }

      // ======= ПЕРЕВОРОТ =======
      window.flip = function() {
        if (flipped || isAnimating) return;
        flipped = true;
        document.getElementById('scene').classList.add('flipped');
      };

      // ======= ОЦЕНКА (вызывается автоматически) =======
      function doRate(score) {
        const i = String(queue[qIdx]);
        const state = cardStates[i];
        const now = new Date();
        const rating = score === 1 ? Rating.Good : Rating.Again;
        const result = f.next(state.card, now, rating);
        cardStates[i] = {
          card: result.card,
          due: result.card.due.toISOString()
        };
        saveStates();
        if (score === 1) sessionKnown++; else sessionUnknown++;
        qIdx++;
        if (qIdx >= queue.length) {
          // завершение — убираем переворот и показываем итог
          document.getElementById('scene').classList.remove('flipped');
          flipped = false;
          setTimeout(() => showDone(), 520);
        } else {
          renderCard();
        }
      }

      // ======= ПРОВЕРКА ОТВЕТА =======
      window.checkAnswer = function() {
        if (isAnimating) return;
        const c = s.cards[queue[qIdx]];
        const answerInput = document.getElementById('answer-input');
        const feedback    = document.getElementById('answer-feedback');
        const userAnswer  = answerInput.value;

        if (!userAnswer.trim()) return;

        let correct = false;
        if (c.type === 'formula') {
          correct = normalizeLatex(userAnswer) === normalizeLatex(c.a);
        } else if (c.type === 'simple') {
          correct = normalizeSimple(userAnswer) === normalizeSimple(c.a);
        } else {
          correct = normalizeText(userAnswer) === normalizeText(c.a);
        }

        answerInput.disabled = true;
        feedback.style.display = 'block';
        document.getElementById('submit-btn').style.display = 'none';

        if (correct) {
          answerInput.classList.add('correct');
          feedback.className = 'correct';
          feedback.textContent = '✓ Правильно!';
        } else {
          answerInput.classList.add('wrong');
          feedback.className = 'wrong';
          if (c.type === 'formula' || c.type === 'simple') {
            const correctEl = document.createElement('span');
            feedback.textContent = '✗ Неверно. Правильно: ';
            feedback.appendChild(correctEl);
            try {
              katex.render(c.a, correctEl, { throwOnError: false, displayMode: false });
            } catch(e) {
              correctEl.textContent = c.a;
            }
          } else {
            feedback.textContent = `✗ Неверно. Правильно: ${c.a}`;
          }
        }

        // Показываем кнопку "Следующая"
        const nextBtn = document.getElementById('next-btn');
        nextBtn.style.display = 'block';
        nextBtn.onclick = () => {
          nextBtn.style.display = 'none';
          document.getElementById('input-area').style.display = 'none';
          window.flip();
          setTimeout(() => doRate(correct ? 1 : 0), 600);
        };
      };

      document.getElementById('answer-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') window.checkAnswer();
      });

      function showDone() {
        document.getElementById('card-area').style.display = 'none';
        document.getElementById('done-screen').classList.remove('hidden');
        document.getElementById('done-known').textContent = sessionKnown;
        document.getElementById('done-unknown').textContent = sessionUnknown;
        const pct = Math.round(sessionKnown / s.cards.length * 100);
        document.getElementById('done-sub').textContent =
          pct === 100 ? 'Вы знаете все карточки! 🚀' :
          pct >= 70   ? `${pct}% карточек — отличный результат!` :
                        `${pct}% карточек — повторите незнакомые.`;
      }

      window.restart = function() {
        buildQueue();
        renderCard();
      };

      // ======= ТЕОРИЯ =======
      const theoryList = document.getElementById('theory-list');
      if (!s.theory || s.theory.length === 0) {
        theoryList.innerHTML = '<div class="theory-empty">Видео появятся после записи в Manim</div>';
      } else {
        s.theory.forEach((t, i) => {
          const div = document.createElement('div');
          div.className = 'theory-card';
          div.id = 'tc-' + i;
          let bodyContent = '';
          if (t.video) {
            bodyContent = `<video controls preload="none"><source src="${t.video}" type="video/mp4"></video>`;
          } else if (t.pdf) {
            bodyContent = `
              <div class="pdf-wrap">
                <a class="pdf-btn" href="${t.pdf}" target="_blank">📄 Открыть PDF</a>
                <iframe src="${t.pdf}" class="pdf-frame"></iframe>
              </div>`;
          }
          div.innerHTML = `
            <div class="theory-header" onclick="toggleTheory(${i})">
              <span class="theory-title">${t.title}</span>
              <span class="theory-arrow">›</span>
            </div>
            <div class="theory-body">${bodyContent}</div>`;
          theoryList.appendChild(div);
        });
      }

      window.toggleTheory = function(i) {
        document.getElementById('tc-' + i).classList.toggle('open');
      };

      // ======= ПРОГРЕСС =======
      window.renderProgressList = function() {
        const list = document.getElementById('progress-list');
        list.innerHTML = '';
        const now = new Date();
        s.cards.forEach((c, i) => {
          const state = cardStates[String(i)];
          const due = new Date(state.due);
          const isDue = due <= now;
          const daysLeft = Math.ceil((due - now) / 86400000);
          const item = document.createElement('div');
          item.className = 'progress-item';
          const text = document.createElement('div');
          text.className = 'progress-item-text';
          text.textContent = c.q.replace(/\$\$?[^$]+\$\$?/g, '(формула)');
          const info = document.createElement('div');
          info.style.cssText = 'font-size:12px; white-space:nowrap; flex-shrink:0;';
          info.style.color = isDue ? '#e07070' : '#555';
          info.textContent = isDue ? 'сегодня' : `через ${daysLeft} дн.`;
          item.appendChild(text);
          item.appendChild(info);
          list.appendChild(item);
        });
      };

      buildQueue();
      renderCard();
    }

    window.switchTab = function(name, btn) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('section-' + name).classList.add('active');
      btn.classList.add('active');
      if (name === 'progress') window.renderProgressList();
    };
  </script>

</body>
</html>
